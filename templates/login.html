{% extends "base.html" %}
{% block title %}Вход{% endblock %}
{% block content %}
<div style="max-width: 400px; margin: 4rem auto; background: #fff; padding: 2rem; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
    <h2 style="margin-bottom: 1.5rem;">Вход в систему</h2>
    <form method="POST">
        <input type="email" name="email" placeholder="Email" required style="width: 100%; padding: 0.6rem; margin-bottom: 0.8rem; border: 1px solid #ccc; border-radius: 4px;">
        <input type="password" name="password" placeholder="Пароль" required style="width: 100%; padding: 0.6rem; margin-bottom: 1rem; border: 1px solid #ccc; border-radius: 4px;">
        <button type="submit" style="width: 100%; padding: 0.7rem; background: var(--accent); color: #fff; border: none; border-radius: 4px; cursor: pointer; font-weight: 500;">Войти</button>
    </form>
    <p style="margin-top: 1rem; font-size: 0.9rem; color: #666;">Демо: любой email/пароль (Этап 1)</p>
</div>
{% endblock %}
